# Secret template — DO NOT commit real credentials.
# Apply via: kubectl apply -f secret.yaml
# Or use a Secrets Manager / Vault integration and remove this file from git.
apiVersion: v1
kind: Secret
metadata:
  name: finrag-secrets
  namespace: finrag
  labels:
    app.kubernetes.io/name: finrag
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # AWS credentials (prefer IRSA / Pod Identity over long-lived keys)
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"

  # PostgreSQL connection URL with embedded credentials
  POSTGRES_URL: "postgresql://finrag:REPLACE_ME@finrag-postgres:5432/finrag_db"

  # WandB API key (optional)
  WANDB_API_KEY: ""
