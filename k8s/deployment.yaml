apiVersion: apps/v1
kind: Deployment
metadata:
  name: finrag-api
  namespace: finrag
  labels:
    app.kubernetes.io/name: finrag
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: finrag-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: finrag-api
        app.kubernetes.io/name: finrag
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: finrag-api
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      initContainers:
        - name: wait-for-index
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for index store volume..." && sleep 2 && echo "Ready"

      containers:
        - name: api
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/finrag-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          command:
            - python
            - -m
            - uvicorn
            - src.api.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --workers
            - "1"
            - --log-level
            - info

          envFrom:
            - configMapRef:
                name: finrag-config
            - secretRef:
                name: finrag-secrets

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          volumeMounts:
            - name: index-store
              mountPath: /app/index_store
            - name: model-store
              mountPath: /app/models
            - name: tmp
              mountPath: /tmp

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      volumes:
        - name: index-store
          persistentVolumeClaim:
            claimName: finrag-index-pvc
        - name: model-store
          persistentVolumeClaim:
            claimName: finrag-model-pvc
        - name: tmp
          emptyDir: {}

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: finrag-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: finrag-api
  namespace: finrag
  annotations:
    # AWS IRSA annotation — replace with your IAM role ARN
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/finrag-api-role"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: finrag-index-pvc
  namespace: finrag
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: efs-sc  # Use EFS for ReadWriteMany across pods
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: finrag-model-pvc
  namespace: finrag
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: efs-sc
