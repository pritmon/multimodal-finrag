apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finrag-api
  namespace: finrag
  labels:
    app.kubernetes.io/name: finrag
    app.kubernetes.io/component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    # TLS termination and redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # CORS headers (also set in FastAPI, but belt-and-suspenders at nginx level)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    # cert-manager for automatic TLS certificate provisioning
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.finrag.example.com
      secretName: finrag-tls
  rules:
    - host: api.finrag.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finrag-api
                port:
                  name: http
