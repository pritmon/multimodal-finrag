name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            PyMuPDF==1.26.5 \
            Pillow==11.3.0 \
            reportlab==4.1.0 \
            pytest==8.0.0 \
            pytest-asyncio==0.23.0

      - name: Show installed packages
        run: pip list

      - name: Run tests
        run: |
          pytest tests/test_pdf_parser.py -v --tb=long -p no:asyncio
