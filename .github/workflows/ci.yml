name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi==0.128.8 \
            "uvicorn[standard]==0.39.0" \
            pydantic==2.13.4 \
            pydantic-settings==2.11.0 \
            python-multipart==0.0.20 \
            python-dotenv==1.2.1 \
            httpx==0.28.1 \
            boto3==1.40.61 \
            PyMuPDF==1.26.5 \
            Pillow==11.3.0 \
            rank_bm25==0.2.2 \
            numpy==1.26.4 \
            pytest==8.0.0 \
            pytest-asyncio==0.23.0 \
            pytest-cov==4.1.0

      - name: Run tests
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          BEDROCK_MODEL_ID: amazon.nova-lite-v1:0
        run: |
          pytest tests/ -m "not slow" --tb=short -q --ignore=tests/test_lora_inference.py --ignore=tests/test_rag_pipeline.py
